services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bio_auto_scientist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/bio_auto_scientist
      REDIS_URL: redis://redis:6379/0
      TOOL_MODE: mock
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/api:/app/apps/api
      - ./agents:/app/agents
      - ./tools:/app/tools

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - /app/apps/frontend/node_modules

volumes:
  postgres_data:
